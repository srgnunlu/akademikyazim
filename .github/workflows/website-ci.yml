name: Website CI

on:
  push:
    paths:
      - "website/**"
  pull_request:
    paths:
      - "website/**"

defaults:
  run:
    working-directory: website

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: website/test-results/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Start server
        run: npm start &
        env:
          PORT: "3000"

      - name: Wait for server
        run: npx wait-on http://localhost:3000/tr --timeout 30000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/tr
            http://localhost:3000/en
          budgetPath: website/lighthouse-budget.json
          uploadArtifacts: true
