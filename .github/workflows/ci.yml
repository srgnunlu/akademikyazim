name: TezAtlas CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Skill Graph Integrity
  # ─────────────────────────────────────────────
  skill-graph:
    name: Skill Graph Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyyaml pytest

      - name: Run skill graph tests
        run: pytest tests/test_skill_graph.py -v

  # ─────────────────────────────────────────────
  # Job 2: Frontmatter Schema Validation
  # ─────────────────────────────────────────────
  frontmatter:
    name: Frontmatter Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyyaml pytest

      - name: Run frontmatter tests
        run: pytest tests/test_frontmatter.py -v

  # ─────────────────────────────────────────────
  # Job 3: Phase Chain Continuity
  # ─────────────────────────────────────────────
  phase-chain:
    name: Phase Chain Continuity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyyaml pytest

      - name: Run phase chain tests
        run: pytest tests/test_phase_chain.py -v

  # ─────────────────────────────────────────────
  # Job 4: OCR Pipeline Smoke Test
  # ─────────────────────────────────────────────
  ocr-pipeline:
    name: OCR Pipeline Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCR dependencies
        run: pip install pymupdf pytest

      - name: Run OCR pipeline tests
        run: pytest tests/test_ocr_pipeline.py -v

  # ─────────────────────────────────────────────
  # Job 5: Agents Module Tests
  # ─────────────────────────────────────────────
  agents-module:
    name: Agents Module Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: pip install openai anthropic pyyaml python-dotenv pymupdf pytest pytest-asyncio

      - name: Run agents tests
        run: pytest tests/test_agents.py -v
        env:
          # No real API keys in CI — tests use mocks
          GEMINI_API_KEY: "ci-test-key"
          DEEPSEEK_API_KEY: "ci-test-key"

  # ─────────────────────────────────────────────
  # Job 6: Lint (ruff)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: Lint check
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 7: Type Check (mypy)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mypy types-PyYAML openai anthropic pyyaml python-dotenv pymupdf

      - name: Run mypy
        run: mypy agents/ core/ tools/ --ignore-missing-imports

  # ─────────────────────────────────────────────
  # Job 8: Security Scan (bandit)
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r agents/ core/ scripts/ tools/ -ll

  # ─────────────────────────────────────────────
  # Job 9: YAML Config Validation
  # ─────────────────────────────────────────────
  yaml-config:
    name: YAML Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Validate agents.yaml
        run: pytest tests/test_agents_yaml.py -v
