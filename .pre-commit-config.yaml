repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python linting + formatting (ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Markdown lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: ^skills/.*\.md$

  # Local hooks (Python scripts)
  - repo: local
    hooks:
      - id: frontmatter-schema
        name: Validate skill node frontmatter
        language: python
        entry: python scripts/check_frontmatter.py
        files: ^skills/.*\.md$
        pass_filenames: true
        additional_dependencies: [pyyaml]

      - id: no-pdf-in-sources
        name: Block accidentally committed PDFs in sources/
        language: python
        entry: python scripts/check_no_pdf.py
        files: ^sources/.*\.(pdf|PDF)$
        pass_filenames: true

      - id: status-staleness
        name: Warn if STATUS.md is stale (> 7 days)
        language: python
        entry: python scripts/check_status_staleness.py
        pass_filenames: false
        always_run: true
        additional_dependencies: []

      - id: no-env-file
        name: Block .env file commits
        language: fail
        entry: ".env file must not be committed — use .env.example"
        files: ^\.env$
